name: CI/CD Pipeline

# Настраиваем workflow, который будет запускаться автоматически при каждом push в ветку main [cite: 37]
on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Получение исходного кода из репозитория [cite: 39]
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Настройка среды Node.js (используем версию 18, как в нашем Dockerfile) [cite: 39]
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # 3. Установка зависимостей проекта [cite: 40]
      - name: Install dependencies
        run: npm install

      # 4. Сборка приложения (компиляция TypeScript в JavaScript) [cite: 41]
      - name: Build application
        run: npm run build

      # 5. Авторизация в Docker Hub (необходима для отправки образа)
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 6. Сборка Docker-образа из оптимизированного Dockerfile2 [cite: 42]
      - name: Build Docker image
        run: docker build -f Dockerfile2 -t ${{ secrets.DOCKER_USERNAME }}/nest-app-optimized:latest .

      # 7. Отправка (push) собранного образа в контейнерный реестр Docker Hub [cite: 43]
      - name: Push Docker image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/nest-app-optimized:latest

      # 8. Развертывание приложения на облачной платформе Heroku [cite: 44]
      - name: Deploy to Heroku
        uses: akhileshns/heroku-deploy@v3.13.15
        with:
          heroku_api_key: ${{ secrets.HEROKU_API_KEY }}
          heroku_app_name: ${{ secrets.HEROKU_APP_NAME }}
          heroku_email: ${{ secrets.HEROKU_EMAIL }}
          usedocker: true