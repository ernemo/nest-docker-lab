name: CI/CD Pipeline

# 1. Настройка триггера: запуск при пуше в ветку main
on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 2. Получение исходного кода (Задание 2)
      - name: Checkout code
        uses: actions/checkout@v4

      # 3. Настройка среды Node.js (Задание 2)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # 4. Установка зависимостей (Задание 2)
      - name: Install dependencies
        run: npm install

      # 5. Запуск тестов (Задание 3)
      # Если тесты упадут, пайплайн остановится здесь и не пойдет дальше
      - name: Run tests
        run: npm run test

      # 6. Сборка приложения (Задание 2)
      - name: Build application
        run: npm run build

      # 7. Авторизация в Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 8. Сборка Docker-образа из Dockerfile2 (Задание 2)
      - name: Build Docker image
        run: docker build -f Dockerfile2 -t ${{ secrets.DOCKER_USERNAME }}/nest-app-optimized:latest .

      # 9. Отправка (push) образа в Docker Hub (Задание 2)
      - name: Push Docker image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/nest-app-optimized:latest

      # 10. Развертывание на Heroku (Задание 2)
      - name: Deploy to Heroku
        uses: akhileshns/heroku-deploy@v3.13.15
        with:
          heroku_api_key: ${{ secrets.HEROKU_API_KEY }}
          heroku_app_name: ${{ secrets.HEROKU_APP_NAME }}
          heroku_email: ${{ secrets.HEROKU_EMAIL }}
          usedocker: true